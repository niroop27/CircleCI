version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - run:
          name: Compile Java program
          command: javac add.java
      - persist_to_workspace:
          root: .
          paths:
            - add.class

  test:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run Java program
          command: java add

workflows:
  build_and_test:
    jobs:
      - build
      - test:
          requires:
            - build
